name: Build Native Addons

on:
  push:
    branches: [main]
    paths:
      - 'deps/@ant/computer-use-input/**'
      - 'deps/@ant/computer-use-swift/**'
      - '.github/workflows/build-native.yml'
  pull_request:
    branches: [main]
    paths:
      - 'deps/@ant/computer-use-input/**'
      - 'deps/@ant/computer-use-swift/**'

jobs:
  build-input:
    name: computer-use-input (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: computer-use-input.node
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: computer-use-input.node
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: computer_use_input.dll

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            deps/@ant/computer-use-input/target
          key: cargo-input-${{ matrix.target }}-${{ hashFiles('deps/@ant/computer-use-input/Cargo.toml') }}

      - name: Build (cargo check on current platform)
        working-directory: deps/@ant/computer-use-input
        run: cargo check --target ${{ matrix.target }}

      - name: Build release
        working-directory: deps/@ant/computer-use-input
        run: cargo build --release --target ${{ matrix.target }}

      - name: Stage artifact (macOS)
        if: runner.os == 'macOS'
        working-directory: deps/@ant/computer-use-input
        run: |
          mkdir -p prebuilds/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/libcomputer_use_input.dylib prebuilds/${{ matrix.target }}/computer-use-input.node
          echo "ARTIFACT_PATH=prebuilds/${{ matrix.target }}/computer-use-input.node" >> $GITHUB_ENV

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        working-directory: deps/@ant/computer-use-input
        shell: bash
        run: |
          mkdir -p prebuilds/${{ matrix.target }}
          cp target/${{ matrix.target }}/release/computer_use_input.dll prebuilds/${{ matrix.target }}/computer-use-input.node
          echo "ARTIFACT_PATH=prebuilds/${{ matrix.target }}/computer-use-input.node" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: computer-use-input-${{ matrix.target }}
          path: deps/@ant/computer-use-input/prebuilds/${{ matrix.target }}/computer-use-input.node
          if-no-files-found: error

  build-swift:
    name: computer-use-swift (macOS only)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Swift package
        working-directory: deps/@ant/computer-use-swift
        run: swift build

      - name: Verify TypeScript compilation
        run: |
          bun install --silent
          bunx tsc --noEmit --pretty false 2>&1 | grep -i "computer-use" || echo "No computer-use TS errors"
