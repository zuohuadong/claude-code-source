[package]
name = "computer-use-input"
version = "0.1.0"
edition = "2021"
description = "NAPI-RS keyboard/mouse input via enigo, dispatched to macOS main thread"
license = "MIT"

[lib]
crate-type = ["cdylib"]

[dependencies]
napi = { version = "2.16", features = ["tokio_rt", "async"] }
napi-derive = "2"
enigo = "0.6"
dispatch2 = "0.3"
tokio = { version = "1", features = ["full"] }
once_cell = "1"
objc2 = "0.5"
objc2-app-kit = "0.2"
objc2-foundation = "0.2"

[build-dependencies]
napi-build = "2"

[profile.release]
lto = true
opt-level = 3
panic = "abort"
